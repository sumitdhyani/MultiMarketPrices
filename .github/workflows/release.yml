# Release workflow for BinanceMD.
#
# Triggers on a push of a tag matching:  binance-md/vMAJOR.MINOR.PATCH
#
# Steps:
#   1. Run the full CI gate (build + IT tests) via workflow_call.
#   2. On success: build the production multi-stage Docker image and push to GHCR.
#
# Image is pushed with two tags:
#   ghcr.io/sumitdhyani/binance-md:vX.Y.Z   ← immutable, version-pinned
#   ghcr.io/sumitdhyani/binance-md:latest    ← mutable, always newest release
#
# To cut a release:
#   git tag -a binance-md/v1.0.0 -m "Release v1.0.0"
#   git push origin binance-md/v1.0.0

name: Release — BinanceMD

on:
  push:
    tags:
      - 'binance-md/v*.*.*'

jobs:

  # ── Gate: build + IT tests must pass before publishing ────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Publish production image to GHCR ──────────────────────────────────────
  publish:
    needs: ci
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Strip the "binance-md/" namespace from the tag so the image is tagged
      # as "v1.0.0" rather than "binance-md/v1.0.0".
      - name: Extract version from tag
        run: |
          echo "VERSION=${GITHUB_REF_NAME#binance-md/}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The builder stage layers are already warm in the GHA cache from the CI
      # job above — this run only builds the lightweight runtime stage.
      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/BinanceMD/Dockerfile
          push: true
          build-args: VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/sumitdhyani/binance-md:${{ env.VERSION }}
            ghcr.io/sumitdhyani/binance-md:latest
          cache-from: type=gha,scope=binancemd-builder
          cache-to:   type=gha,mode=max,scope=binancemd-builder
